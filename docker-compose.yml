version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: neefl-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: neefl
      MYSQL_USER: neefl
      MYSQL_PASSWORD: neefl
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - neefl_mysql:/var/lib/mysql

volumes:
  neefl_mysql:
